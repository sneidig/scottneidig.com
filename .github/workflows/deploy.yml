name: Deploy

# Push to main builds, tests, and deploys. Tests gate the deploy: a failing test stops it.
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build
        run: dotnet build src/ScottNeidig.Web/ScottNeidig.Web.csproj -c Release

      - name: Test
        run: dotnet test tests/ScottNeidig.Web.Tests/ScottNeidig.Web.Tests.csproj -c Release --no-build

      - name: Publish
        run: dotnet publish src/ScottNeidig.Web/ScottNeidig.Web.csproj -c Release -o publish --no-build

      # Stops the IIS app so the running DLLs unlock and can be overwritten. This is what fixed
      # the file-lock problem from the manual v1 deploys.
      - name: Take app offline
        run: |
          echo "Deploying, back shortly." > app_offline.htm
          curl --ssl-reqd -T app_offline.htm "ftp://${{ secrets.FTP_SERVER }}/staging.scottneidig.com/" \
            --user "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}"

      # Diff-based: keeps a state file on the server and uploads only changed files. First run
      # is a full sync; every one after is seconds.
      - name: Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: ./publish/
          server-dir: /staging.scottneidig.com/

      # Removing app_offline.htm restarts the app, which applies migrations and seeds on boot.
      - name: Bring app online
        if: always()
        run: |
          curl --ssl-reqd "ftp://${{ secrets.FTP_SERVER }}/staging.scottneidig.com/" \
            --user "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}" \
            -Q "DELE app_offline.htm"
