name: Deploy

# Push to main builds, tests, and deploys. Tests gate the deploy: a failing test stops it.
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build
        run: dotnet build src/ScottNeidig.Web/ScottNeidig.Web.csproj -c Release

      - name: Test
        run: dotnet test tests/ScottNeidig.Web.Tests/ScottNeidig.Web.Tests.csproj -c Release --no-build

      # win-x64 framework-dependent: the server is Windows, so this ships only the Windows
      # native libs instead of every platform's, which cut the publish from ~480MB to ~110MB.
      - name: Publish
        run: dotnet publish src/ScottNeidig.Web/ScottNeidig.Web.csproj -c Release -r win-x64 --self-contained false -o publish

      # Stops the IIS app so the running DLLs unlock and can be overwritten. This is what fixed
      # the file-lock problem from the manual v1 deploys.
      - name: Take app offline
        run: |
          echo "Deploying, back shortly." > app_offline.htm
          curl --ssl-reqd -k -T app_offline.htm "ftp://${{ secrets.FTP_SERVER }}/staging.scottneidig.com/" \
            --user "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}"

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      # lftp over the previous action because it handles FTPS data-channel TLS on shared hosts,
      # which basic-ftp was choking on. mirror -R uploads only changed files (diff by size/time),
      # --delete removes stale ones, and -X keeps app_offline.htm so the offline step still works.
      - name: Deploy
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -c "
            set ftp:ssl-force true;
            set ftp:ssl-protect-data true;
            set ssl:verify-certificate no;
            set net:max-retries 3;
            set net:timeout 20;
            set ftp:use-site-chmod false;
            open -u \"$FTP_USERNAME\",\"$FTP_PASSWORD\" \"$FTP_SERVER\";
            mirror -R --delete -X app_offline.htm --no-perms --parallel=1 --verbose ./publish/ /staging.scottneidig.com/;
          "

      # Removing app_offline.htm restarts the app, which applies migrations and seeds on boot.
      - name: Bring app online
        if: always()
        run: |
          # -Q runs at the login root, so CD into the site folder first, then delete. Tolerate
          # failure so a missing file doesn't fail the run.
          curl --ssl-reqd -k "ftp://${{ secrets.FTP_SERVER }}/" \
            --user "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}" \
            -Q "CWD staging.scottneidig.com" -Q "DELE app_offline.htm" || echo "app_offline.htm already removed"
